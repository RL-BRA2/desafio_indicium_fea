models:
  - name: int_motivos_pedidos
    description: "Modelo intermediário responsável por achatar a relação Muitos-para-Muitos de motivos de venda usando listagg, evitando duplicação na Fato."

  - name: int_vendas_ajustadas
    description: "Modelo intermediário que consolida as regras de negócio financeiras de faturamento bruto, descontos e faturamento líquido."
    columns:
      - name: id_pedido_detalhe
        description: "Identificador único do item do pedido."
      - name: faturamento_bruto
        description: "Cálculo matemático: (quantidade comprada * preço unitário)."
      - name: total_desconto
        description: "Cálculo matemático: (quantidade comprada * preço unitário * desconto unitário)."
      - name: faturamento_liquido
        description: "Cálculo matemático: (quantidade comprada * preço unitário) - desconto unitário."
