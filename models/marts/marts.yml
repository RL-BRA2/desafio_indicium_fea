models:
  - name: dim_clientes
    description: "Tabela dimensional com o cadastro dos clientes (Pessoas Físicas e Empresas)."
    columns:
      - name: id_cliente
        description: "Chave primária do cliente."
        tests:
          - unique
          - not_null
      - name: nome_cliente
        description: "Nome completo do cliente ou Razão Social da loja/empresa."

  - name: dim_produtos
    description: "Tabela dimensional contendo o catálogo de produtos e seus respectivos preços de lista."
    columns:
      - name: id_produto
        description: "Chave primária do produto."
        tests:
          - unique
          - not_null
      - name: nome_produto
        description: "Nome comercial do produto."

  - name: dim_localidades
    description: "Tabela dimensional contendo o  endereço, cidade, estado e país."
    columns:
      - name: id_endereco
        description: "Chave primária da localidade."
        tests:
          - unique
          - not_null
      - name: cidade
        description: "Nome da cidade de entrega."

  - name: fct_vendas
    description: "Tabela fato principal do projeto. Contém as métricas financeiras de quantidade, preço e valores líquidos negociados."
    columns:
      - name: id_pedido_detalhe
        description: "Chave primária do item do pedido."
        tests:
          - unique
          - not_null
      - name: valor_total_negociado
        description: "Métrica de faturamento líquido por item, já descontados os abatimentos percentuais."
