models:
  - name: dim_clientes
    description: "Tabela dimensional com o cadastro dos clientes (Pessoas Físicas e Empresas)."
    columns:
      - name: id_cliente
        description: "Chave primária do cliente."
        tests:
          - unique
          - not_null
      - name: nome_cliente
        description: "Nome completo do cliente ou Razão Social da loja/empresa."
