models:
  - name: stg_enderecos
    description: "Tabela de endereços físicos, padronizando chaves e localizações."
    columns:
      - name: id_endereco
        description: "Chave primária do endereço."
        tests:
          - unique
          - not_null
      - name: cidade
        description: "Nome da cidade associada ao endereço."
      - name: id_estado
        description: "Chave estrangeira de ligação com a tabela de estados."

  - name: stg_estados
    description: "Tabela de estados e províncias, contendo os nomes e códigos de regiões."
    columns:
      - name: id_estado_provincia
        description: "Chave primária do estado."
        tests:
          - unique
          - not_null
      - name: nome_estado
        description: "Nome por extenso do estado ou província."

  - name: stg_paises
    description: "Tabela de países."
    columns:
      - name: codigo_regiao_pais
        description: "Chave Primária do país."
        tests:
          - unique
          - not_null
      - name: nome_pais
        description: "Nome por extenso do país."

  - name: stg_clientes
    description: "Tabela que identifica e unifica os clientes da Adventure Works (B2C e B2B)."
    columns:
      - name: id_cliente
        description: "Chave primária do cliente."
        tests:
          - unique
          - not_null

  - name: stg_pessoas
    description: "Cadastro de pessoas físicas, contendo o cálculo automatizado do nome completo."
    columns:
      - name: id_pessoa
        description: "Chave primária identificadora da pessoa."
        tests:
          - unique
          - not_null
      - name: nome_completo
        description: "Nome completo do cliente sem espaços excedentes, gerado via concatenação no staging."

  - name: stg_lojas
    description: "Cadastro de lojas e empresas parceiras que atuam como clientes corporativos."
    columns:
      - name: id_loja
        description: "Chave primária identificadora da loja."
        tests:
          - unique
          - not_null

  - name: stg_produtos
    description: "Catálogo unificado de produtos comercializados, contendo custos e preços de lista brutos."
    columns:
      - name: id_produto
        description: "Chave primária do produto."
        tests:
          - unique
          - not_null

  - name: stg_cartoes_credito
    description: "Tabela contendo os dados de pagamento por cartão, omitindo dados sensíveis em conformidade com as boas práticas."
    columns:
      - name: id_cartao_credito
        description: "Chave primária do cartão de crédito."
        tests:
          - unique
          - not_null
      - name: tipo_cartao
        description: "Bandeira/Tipo do cartão de crédito (ex: MasterCard, Vista)."

  - name: stg_pedidos_cabecalhos
    description: "Cabeçalho das ordens de venda contendo metadados gerais do pedido, datas e chaves de relacionamento."
    columns:
      - name: id_pedido
        description: "Chave primária do pedido de venda."
        tests:
          - unique
          - not_null

  - name: stg_pedidos_detalhes
    description: "Detalhamento dos itens que compõem cada pedido de venda, contendo quantidades e preços."
    columns:
      - name: id_pedido_detalhe
        description: "Chave primária identificadora do item do pedido."
        tests:
          - unique
          - not_null
      - name: id_pedido
        description: "Chave estrangeira ligando o item ao seu respectivo cabeçalho."

  - name: stg_motivos_venda
    description: "Cadastro dos motivos comerciais mapeados no sistema."
    columns:
      - name: id_motivo_venda
        description: "Chave primária do motivo de venda."
        tests:
          - unique
          - not_null

  - name: stg_pedidos_motivos
    description: "Tabela ponte Muitos-para-Muitos mapeando quais pedidos possuem quais motivos de venda."
    columns:
      - name: id_pedido
        description: "Chave estrangeira do pedido."
      - name: id_motivo_venda
        description: "Chave estrangeira do motivo."
