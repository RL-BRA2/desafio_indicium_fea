sources:
  - name: raw
    schema: dbt_rsantos
    tables:
      - name: person_address
        columns:
          - name: addressid
            tests:
              - unique
              - not_null

      - name: person_stateprovince
        columns:
          - name: stateprovinceid
            tests:
              - unique
              - not_null

      - name: person_countryregion
        columns:
          - name: countryregioncode
            tests:
              - unique
              - not_null

      - name: person_person
        columns:
          - name: businessentityid
            tests:
              - unique
              - not_null

      - name: sales_customer
        columns:
          - name: customerid
            tests:
              - unique
              - not_null

      - name: production_product
        columns:
          - name: productid
            tests:
              - unique
              - not_null

      - name: sales_creditcard
        columns:
          - name: creditcardid
            tests:
              - unique
              - not_null

      - name: sales_salesorderheader
        columns:
          - name: salesorderid
            tests:
              - unique
              - not_null

      - name: sales_salesorderdetail
        columns:
          - name: salesorderdetailid
            tests:
              - unique
              - not_null

      - name: sales_salesreason
        columns:
          - name: salesreasonid
            tests:
              - unique
              - not_null

      - name: sales_salesorderheadersalesreason
        columns:
          - name: salesorderid
            tests:
              - not_null
          - name: salesreasonid
            tests:
              - not_null

      - name: sales_store
        columns:
          - name: businessentityid
            tests:
              - unique
              - not_null



