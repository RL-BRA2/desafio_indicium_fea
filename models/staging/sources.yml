sources:
  - name: raw
    catalog: raw
    schema: dbt_rsantos
    description: "Esquema contendo os dados brutos carregados a partir dos arquivos da pasta Adventure."
    
    tables:
      - name: person_address
        description: "Tabela original contendo o cadastro de logradouros, cidades e chaves de localização geográfica."
        columns:
          - name: addressid
            description: "Chave primária do endereço."
            tests:
              - unique
              - not_null

      - name: person_stateprovince
        description: "Cadastro de estados e províncias vinculados aos países de operação."
        columns:
          - name: stateprovinceid
            description: "Chave primária do estado/província."
            tests:
              - unique
              - not_null

      - name: person_countryregion
        description: "Cadastro internacional contendo os códigos e os nomes dos países."
        columns:
          - name: countryregioncode
            description: "Chave Primária do país."
            tests:
              - unique
              - not_null

      - name: person_person
        description: "Cadastro unificado de pessoas físicas, cobrindo clientes individuais e colaboradores."
        columns:
          - name: businessentityid
            description: "Chave primária da pessoa física."
            tests:
              - unique
              - not_null

      - name: sales_customer
        description: "Tabela de mapeamento dos clientes do sistema. Conecta as vendas aos registros de pessoas (B2C) ou lojas (B2B)."
        columns:
          - name: customerid
            description: "Chave primária do cliente comercial."
            tests:
              - unique
              - not_null

      - name: sales_store
        description: "Cadastro corporativo das lojas e empresas parceiras que compram no modelo B2B."
        columns:
          - name: businessentityid
            description: "Chave primária da loja/empresa."
            tests:
              - unique
              - not_null

      - name: production_product
        description: "Catálogo contendo o cadastro de todos os produtos, custos tabelados e preços de lista."
        columns:
          - name: productid
            description: "Chave primária do produto."
            tests:
              - unique
              - not_null

      - name: sales_creditcard
        description: "Tabela com os dados e bandeiras de cartões de crédito associados aos pagamentos."
        columns:
          - name: creditcardid
            description: "Chave primária do cartão de crédito."
            tests:
              - unique
              - not_null

      - name: sales_salesorderheader
        description: "Tabela de cabeçalho das vendas. Armazena dados consolidados do pedido como datas, status, cliente e local de entrega."
        columns:
          - name: salesorderid
            description: "Chave primária do pedido de venda."
            tests:
              - unique
              - not_null

      - name: sales_salesorderdetail
        description: "Detalhamento dos itens de cada pedido. Contém as quantidades compradas, preços praticados e percentuais de desconto."
        columns:
          - name: salesorderdetailid
            description: "Chave primária da linha de item do pedido."
            tests:
              - unique
              - not_null

      - name: sales_salesreason
        description: "Cadastro dos motivos comerciais que justificam ou estimulam as vendas (ex: Promoção, Marketing)."
        columns:
          - name: salesreasonid
            description: "Chave primária do motivo de venda."
            tests:
              - unique
              - not_null

      - name: sales_salesorderheadersalesreason
        description: "Tabela ponte Muitos-para-Muitos (N:N) que vincula os cabeçalhos dos pedidos aos seus respectivos motivos."
        columns:
          - name: salesorderid
            description: "Chave estrangeira do pedido de venda."
            tests:
              - not_null
          - name: salesreasonid
            description: "Chave estrangeira do motivo comercial."
            tests:
              - not_null



